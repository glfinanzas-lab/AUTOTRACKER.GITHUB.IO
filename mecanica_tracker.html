
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A96E;
    --gold-light: #E8D5B0;
    --gold-dark: #8B6E3F;
    --dark: #0F0F0F;
    --dark-2: #1A1A1A;
    --dark-3: #252525;
    --dark-4: #303030;
    --text: #F0EDE8;
    --text-muted: #9A9590;
    --text-dim: #6A6560;
    --accent-green: #4A8C6F;
    --accent-green-bg: #1A2E24;
    --accent-amber: #C9A96E;
    --accent-amber-bg: #2A2115;
    --accent-blue: #4A7A9B;
    --accent-blue-bg: #152030;
    --accent-red: #9B4A4A;
    --accent-red-bg: #2A1515;
    --radius: 4px;
    --radius-lg: 8px;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    font-weight: 300;
  }

  .app { max-width: 900px; margin: 0 auto; padding: 0 24px 60px; }

  /* Header */
  .header {
    padding: 40px 0 32px;
    border-bottom: 1px solid #2A2A2A;
    margin-bottom: 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand-icon {
    width: 44px; height: 44px;
    border: 1px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius);
  }
  .brand-icon svg { width: 22px; height: 22px; stroke: var(--gold); fill: none; stroke-width: 1.5; }
  .brand-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .brand-text p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .tab-bar { display: flex; gap: 4px; }
  .tab-btn {
    padding: 8px 18px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid #2A2A2A;
    color: var(--text-muted);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active, .tab-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 169, 110, 0.06);
  }

  /* Section titles */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, #2A2A2A, transparent);
  }

  /* Admin panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .form-input, .form-select {
    background: var(--dark-2);
    border: 1px solid #2A2A2A;
    color: var(--text);
    padding: 11px 14px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--gold); }
  .form-input::placeholder { color: var(--text-dim); }
  .form-select option { background: var(--dark-2); }

  .status-select-wrapper { position: relative; }
  .status-select-wrapper::after {
    content: '▾';
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); font-size: 12px; pointer-events: none;
  }
  .status-select-wrapper .form-select { width: 100%; padding-right: 32px; }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: rgba(201, 169, 110, 0.1); }

  /* Table */
  .table-wrap { overflow-x: auto; margin-top: 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid #222;
    font-weight: 400;
  }
  tbody tr {
    border-bottom: 1px solid #1C1C1C;
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--dark-2); }
  tbody td { padding: 13px 14px; color: var(--text-muted); font-weight: 300; }
  tbody td:first-child { color: var(--text); font-weight: 400; font-size: 14px; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
  .badge-ingresado { background: var(--accent-blue-bg); color: var(--accent-blue); }
  .badge-ingresado .badge-dot { background: var(--accent-blue); }
  .badge-diagnostico { background: var(--accent-amber-bg); color: var(--accent-amber); }
  .badge-diagnostico .badge-dot { background: var(--accent-amber); }
  .badge-enreparacion { background: var(--accent-amber-bg); color: var(--accent-amber); }
  .badge-enreparacion .badge-dot { background: var(--accent-amber); }
  .badge-listo { background: var(--accent-green-bg); color: #6BBF98; }
  .badge-listo .badge-dot { background: #6BBF98; }
  .badge-entregado { background: #1A1A1A; color: var(--text-dim); }
  .badge-entregado .badge-dot { background: var(--text-dim); }

  .btn-del {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 16px; padding: 2px 6px;
    border-radius: var(--radius); transition: color 0.2s;
    font-family: 'Jost', sans-serif;
  }
  .btn-del:hover { color: var(--accent-red); }

  /* Client panel */
  .search-bar {
    display: flex; gap: 12px; align-items: stretch;
    margin-bottom: 40px;
  }
  .search-input-wrap {
    flex: 1; position: relative;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: var(--text-dim); fill: none; stroke-width: 1.5;
  }
  .search-input {
    width: 100%;
    background: var(--dark-2);
    border: 1px solid #2A2A2A;
    color: var(--text);
    padding: 13px 14px 13px 42px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.05em;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text-dim); letter-spacing: 0.05em; }
  .btn-search {
    padding: 0 24px;
    background: var(--gold-dark);
    border: none;
    color: var(--gold-light);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-search:hover { background: var(--gold); color: var(--dark); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state svg { width: 40px; height: 40px; stroke: #333; fill: none; stroke-width: 1; margin-bottom: 16px; }
  .empty-state p { font-size: 13px; letter-spacing: 0.05em; }

  .client-cards { display: flex; flex-direction: column; gap: 16px; }
  .client-card {
    background: var(--dark-2);
    border: 1px solid #252525;
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .client-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .client-card.listo::before { background: #4A8C6F; }
  .client-card.enreparacion::before { background: var(--gold); }
  .client-card.diagnostico::before { background: var(--gold-dark); }
  .client-card.ingresado::before { background: var(--accent-blue); }
  .client-card.entregado::before { background: #333; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .car-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .card-meta { display: flex; gap: 20px; margin-top: 2px; }
  .meta-item { font-size: 12px; color: var(--text-dim); }
  .meta-item span { color: var(--text-muted); }

  /* Progress track */
  .progress-track { margin-top: 18px; }
  .track-steps { display: flex; align-items: center; gap: 0; }
  .track-step { display: flex; align-items: center; flex: 1; }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid #333; background: transparent;
    flex-shrink: 0; transition: all 0.3s;
  }
  .step-line { flex: 1; height: 1px; background: #2A2A2A; transition: background 0.3s; }
  .step-dot.done { border-color: var(--gold); background: var(--gold); }
  .step-dot.current { border-color: var(--gold); background: transparent;
    box-shadow: 0 0 0 3px rgba(201,169,110,0.2); }
  .step-line.done { background: var(--gold-dark); }
  .track-labels { display: flex; justify-content: space-between; margin-top: 8px; }
  .track-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .track-label.active { color: var(--gold); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--dark-3);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 12px;
    letter-spacing: 0.08em;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .no-results { color: var(--text-dim); font-size: 13px; text-align: center; padding: 40px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      </div>
      <div class="brand-text">
        <h1>AutoTrack</h1>
        <p>Sistema de seguimiento</p>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('cliente')">Consultar</button>
      <button class="tab-btn" onclick="switchTab('admin')">Administrar</button>
    </div>
  </div>

  <!-- PANEL CLIENTE -->
  <div class="panel active" id="panel-cliente">
    <div class="section-label">Seguimiento de su vehículo</div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="search-dni" type="text" placeholder="Ingrese su DNI para consultar..." maxlength="12" oninput="filterByDni()">
      </div>
      <button class="btn-search" onclick="filterByDni()">Buscar</button>
    </div>
    <div id="results-area">
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><circle cx="12" cy="10" r="3"/></svg>
        <p>Ingrese su DNI para ver el estado de su vehículo</p>
      </div>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div class="panel" id="panel-admin">
    <div class="section-label">Registrar vehículo</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">DNI del cliente</label>
        <input class="form-input" id="f-dni" type="text" placeholder="ej. 30456789" maxlength="12">
      </div>
      <div class="form-group">
        <label class="form-label">Nombre del cliente</label>
        <input class="form-input" id="f-nombre" type="text" placeholder="ej. Juan Pérez">
      </div>
      <div class="form-group">
        <label class="form-label">Vehículo</label>
        <input class="form-input" id="f-auto" type="text" placeholder="ej. Toyota Corolla 2018">
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de ingreso</label>
        <input class="form-input" id="f-fecha" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Estado de la reparación</label>
        <div class="status-select-wrapper">
          <select class="form-select" id="f-estado">
            <option value="Ingresado">Ingresado</option>
            <option value="En diagnóstico">En diagnóstico</option>
            <option value="En reparación">En reparación</option>
            <option value="Listo para retirar">Listo para retirar</option>
            <option value="Entregado">Entregado</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Observaciones</label>
        <input class="form-input" id="f-obs" type="text" placeholder="ej. Cambio de frenos, aceite">
      </div>
    </div>
    <button class="btn-primary" onclick="addRecord()">＋ &nbsp; Registrar vehículo</button>

    <div class="table-wrap" style="margin-top:40px">
      <div class="section-label">Registros activos</div>
      <table>
        <thead>
          <tr>
            <th>DNI</th>
            <th>Cliente</th>
            <th>Vehículo</th>
            <th>Ingreso</th>
            <th>Estado</th>
            <th>Obs.</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="records-table"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let records = JSON.parse(localStorage.getItem('autotrack_records') || '[]');
if(!records.length) {
  records = [
    { id:1, dni:'30456789', nombre:'Juan Pérez', auto:'Toyota Corolla 2018', fecha:'2026-05-18', estado:'En reparación', obs:'Cambio de pastillas de freno' },
    { id:2, dni:'28901234', nombre:'María González', auto:'Ford Focus 2020', fecha:'2026-05-20', estado:'Listo para retirar', obs:'Service completo' },
    { id:3, dni:'35123456', nombre:'Carlos López', auto:'Volkswagen Gol 2015', fecha:'2026-05-22', estado:'En diagnóstico', obs:'Falla en motor' },
  ];
  save();
}

function save() {
  localStorage.setItem('autotrack_records', JSON.stringify(records));
  renderTable();
}

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=> b.classList.toggle('active', (i===0 && t==='cliente')||(i===1 && t==='admin')));
  document.getElementById('panel-cliente').classList.toggle('active', t==='cliente');
  document.getElementById('panel-admin').classList.toggle('active', t==='admin');
  if(t==='admin') renderTable();
}

function statusKey(s) {
  return s.toLowerCase().replace(/\s+/g,'').replace('é','e').replace('ó','o').replace('ú','u').replace('á','a');
}

function badgeClass(s) {
  const map = {'Ingresado':'ingresado','En diagnóstico':'diagnostico','En reparación':'enreparacion','Listo para retirar':'listo','Entregado':'entregado'};
  return map[s]||'ingresado';
}

function renderTable() {
  const tb = document.getElementById('records-table');
  if(!records.length){ tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-dim);font-size:13px">Sin registros aún</td></tr>'; return; }
  tb.innerHTML = records.map(r=>`
    <tr>
      <td>${r.dni}</td>
      <td>${r.nombre}</td>
      <td>${r.auto}</td>
      <td>${r.fecha}</td>
      <td><span class="badge badge-${badgeClass(r.estado)}"><span class="badge-dot"></span>${r.estado}</span></td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.obs||'—'}</td>
      <td><button class="btn-del" onclick="deleteRecord(${r.id})" title="Eliminar">×</button></td>
    </tr>
  `).join('');
}

function addRecord() {
  const dni = document.getElementById('f-dni').value.trim();
  const nombre = document.getElementById('f-nombre').value.trim();
  const auto = document.getElementById('f-auto').value.trim();
  const fecha = document.getElementById('f-fecha').value;
  const estado = document.getElementById('f-estado').value;
  const obs = document.getElementById('f-obs').value.trim();
  if(!dni||!nombre||!auto||!fecha){ showToast('Complete los campos obligatorios'); return; }
  records.push({ id: Date.now(), dni, nombre, auto, fecha, estado, obs });
  save();
  ['f-dni','f-nombre','f-auto','f-obs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-fecha').value='';
  document.getElementById('f-estado').selectedIndex=0;
  showToast('Vehículo registrado correctamente');
}

function deleteRecord(id) {
  records = records.filter(r=>r.id!==id);
  save();
}

const STEPS = ['Ingresado','En diagnóstico','En reparación','Listo para retirar','Entregado'];

function progressHTML(estado) {
  const cur = STEPS.indexOf(estado);
  let html = '<div class="progress-track"><div class="track-steps">';
  STEPS.forEach((s,i)=>{
    const done = i < cur;
    const current = i === cur;
    html += `<div class="step-dot ${done?'done':current?'current':''}"></div>`;
    if(i < STEPS.length-1) html += `<div class="step-line ${done||current&&i<cur?'done':''}"></div>`;
  });
  html += '</div><div class="track-labels">';
  STEPS.forEach((s,i)=>{
    const active = i<=cur;
    html += `<span class="track-label ${active?'active':''}">${s.split(' ')[s.split(' ').length-1]}</span>`;
  });
  html += '</div></div>';
  return html;
}

function filterByDni() {
  const q = document.getElementById('search-dni').value.trim();
  const area = document.getElementById('results-area');
  if(!q) {
    area.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><circle cx="12" cy="10" r="3"/></svg><p>Ingrese su DNI para ver el estado de su vehículo</p></div>`;
    return;
  }
  const found = records.filter(r=>r.dni.includes(q));
  if(!found.length) {
    area.innerHTML = `<div class="no-results">No se encontraron vehículos para el DNI <strong style="color:var(--text-muted)">${q}</strong></div>`;
    return;
  }
  area.innerHTML = `<div class="client-cards">${found.map(r=>`
    <div class="client-card ${badgeClass(r.estado)}">
      <div class="card-top">
        <div>
          <div class="car-name">${r.auto}</div>
          <div class="card-meta">
            <span class="meta-item">Cliente: <span>${r.nombre}</span></span>
            <span class="meta-item">Ingreso: <span>${r.fecha}</span></span>
            ${r.obs ? `<span class="meta-item">Obs: <span>${r.obs}</span></span>` : ''}
          </div>
        </div>
        <span class="badge badge-${badgeClass(r.estado)}"><span class="badge-dot"></span>${r.estado}</span>
      </div>
      ${progressHTML(r.estado)}
    </div>
  `).join('')}</div>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

renderTable();
document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
